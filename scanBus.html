<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Institucion lagarita</title>
    <style>
      #camera {
        width: 100%;
      }
      #camera video {
        width: 100%;
        height: 100%;
      }
      #camera canvas.drawingBuffer {
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Logo</a>
      </div>
    </nav>
    <div class="container-fluid titulo row">
      <h1 class="col">Escanea el codigo de un estudiante a la vez</h1>
    </div>
    <div class="container-fluid" id="camera" style="width: 100%"></div>
    <a href="index.html">
        <button>Regresar</button>
    </a>
    <style>
      button {
        width: 100%;
        font-size: 20px;
        font-weight: bold;
        margin-top: 2rem;
        margin-bottom: 2rem;
        background-color: #f0f0f0;
        border: 1px solid black;
      }
      .titulo {
        margin-top: 3rem;
        text-align: center;
      }
      footer {
        background-color: #f0f0f0;
        left: 0;
        bottom: 0;
        width: 100%;
        text-align: center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script>
      const quaggaConf = {
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector("#camera"),
          constraints: {
            width: 100,
            height: 100,
            facingMode: "environment",
            aspect_ratio: { min: 1, max: 2 },
          },
        },
        decoder: {
          readers: ["code_39_reader"],
          multiple: false,
        },
      };

      Quagga.init(quaggaConf, (err) => {
        if (err) {
          console.error(err);
          return;
        }
        Quagga.start();
      });

      Quagga.onDetected((data) => {
        alert(data.codeResult.code);
        window.location.href = `${window.location.origin}/index.html`;
      });
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>

  <footer>
    <div class="container-fluid">
      <div class="row">
        <div class="col">
          <p class="text-center">
            Institucion lagarita 2025@ todos los derechos reservados
          </p>
        </div>
      </div>
    </div>
  </footer>
</html>
