<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Institucion Lagarita</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/ruta_vados.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Logo</a>
      </div>
    </nav>
    <div class="main container-fluid">
      <div class="container-fluid titulo">
        <div class="row">
          <div class="col">
            <h1 class="text-center">Institucion Lagarita</h1>
            <h2 class="text-center">Ruta Vados</h2>
          </div>
        </div>
      </div>
      <div class="container-fluid botones">
        <div class="row">
          <div class="col-md-6">
            <a href="ScanBusVados.html">
              <button>Escanear codigo para la ruta</button>
            </a>
            <a href="DataBusVados.html">
              <button>Ver listado registrados de la semana para el bus</button>
            </a>
            <a href="barcode_scan_colegio/index.html">
              <button>Volver al inicio</button>
            </a>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <style>
      .main {
        margin-top: 3rem;
        display: list-item;
        align-items: center;
        justify-content: center;
      }

      button {
        width: 100%;
        font-size: 20px;
        font-weight: bold;
        margin-top: 2rem;
        margin-bottom: 2rem;
        background-color: #f0f0f0;
        border: 1px solid black;
      }

      .titulo {
        margin-top: 20px;
        margin-bottom: 20px;
      }

      .botones {
        margin-top: 20px;
        margin-bottom: 20px;
        height: 20rem;
        width: 60%;
      }

      .info {
        margin-top: 20px;
        margin-bottom: 20px;
      }

      footer {
        background-color: #f0f0f0;
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        text-align: center;
      }

      body {
        min-height: 100vh;
      }

      #estudiante {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }

      #estudiante h2 {
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        font-size: 20px;
        font-weight: bold;
        position: sticky;
        background-color: #f0f0f0;
        border: 1px solid black;
      }

      .titulo {
        margin-top: 3rem;
        text-align: center;
      }

      footer {
        background-color: #f0f0f0;
        left: 0;
        bottom: 0;
        width: 100%;
        text-align: center;
      }
    </style>
  </body>
  <footer>
    <div class="container-fluid">
      <div class="row">
        <div class="col">
          <p class="text-center">
            Institucion lagarita 2025@ todos los derechos reservados
          </p>
        </div>
      </div>
    </div>
  </footer>
</html>
