    <div class="container-fluid" id="camera" style="width: 100%"></div>
    
    <style>
      button {
        width: 100%;
        font-size: 20px;
        font-weight: bold;
        position: sticky;
        background-color: #f0f0f0;
        border: 1px solid black;
      }
      .titulo {
        margin-top: 3rem;
        text-align: center;
      }
      footer {
        background-color: #f0f0f0;
        left: 0;
        bottom: 0;
        width: 100%;
        text-align: center;
      }
    </style>
    <div id="camera" style="width: 100%"></div>
    <div id="estudiante" >
        <h2>Estudiante</h2>
        <p id="nombre">Nombre: </p>
        <p id="codigo">Codigo: </p>
        <p id="ruta">Ruta: </p>
        <p id="fecha">Fecha: </p>
        <a href="index.html">
          <button>Regresar</button>
      </a>
    </div>

    <style>
      #estudiante {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      }
      #estudiante h2 {
        margin-bottom: 10px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/buslogic.js"></script>
    <script >
      const quaggaConf = {
          inputStream: {
              target: document.querySelector("#camera"),
              // new
              type: "LiveStream",
              constraints: {
                  width: { min: 640 },
                  height: { min: 480 },
                  facingMode: "environment",
                  aspectRatio: { min: 1, max: 2 }
              }
          },
          decoder: {
              readers: ['code_39_reader', 'code_39_vin_reader']
          },
      }
  
      Quagga.init(quaggaConf, function (err) {
          if (err) {
              return console.log(err);
          }
          Quagga.start();
      });
  
      Quagga.onDetected(function (result) {
          Quagga.stop(); // Detener la lectura del código de barras
          showcodes(result.codeResult.code, "PATIOS"); // Llamar a la función para mostrar el código
        });
  </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>

  </body>
